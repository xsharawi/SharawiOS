set-option -g default-shell "/run/current-system/sw/bin/fish"
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

bind j switch-client -n
bind k switch-client -p

unbind %
unbind '"'
bind K split-window -h
bind J split-window -v

set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

unbind r
bind r source-file ~/.tmux.conf

unbind c
bind N new-window
set -sg escape-time 0
set -g mouse on
set -g mode-keys vi
setw -g mode-keys vi
set-window-option -g mode-keys vi
set-option -g focus-events on
# moving between windows with vim movement keys
bind l select-window -t :+
bind h select-window -t :-

bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

unbind Left
unbind Down
unbind Up
unbind Right
unbind C-Up   
unbind C-Down 
unbind C-Left 
unbind C-Right
unbind C-l

# vim-like pane resizing  
bind -r C-k resize-pane -U
bind -r C-j resize-pane -D
bind -r C-h resize-pane -L
bind -r C-l resize-pane -R

unbind m
bind -r m resize-pane -Z

# include tpm
set -g @plugin 'tmux-plugins/tpm'

# list of plugins

set -g @plugin 'tmux-plugins/tmux-resurrect' # keeps after reboot
set -g @plugin 'tmux-plugins/tmux-continuum' # saves sessions after 15m

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes '"~nvim->nvim ."'
set -g @continuum-restore 'on'
set -g @resurrect-restore 'on'

run "~/.tmux/plugins/tpm/tpm"

bind-key -r f run-shell "tmux neww /bin/tmux-sessionizer"

set -g window-style "bg=terminal"
set -g window-active-style "bg=terminal"

unbind C-l
unbind C-h
unbind C-j
unbind C-k
bind-key -n C-l select-pane -L
bind-key -n C-h select-pane -R
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 10


# Tokyonight Moon theme colors
thm_bg="#222436"
thm_fg="#c8d3f5"
thm_cyan="#86e1fc"
thm_black="#1b1d2b"
thm_gray="#3a3f5a"
thm_magenta="#c099ff"
thm_pink="#ff757f"
thm_red="#ff757f"
thm_green="#c3e88d"
thm_yellow="#ffc777"
thm_blue="#82aaff"
thm_orange="#ff9e64"
thm_black4="#444a73"

# Status bar
set -g status "on"
set -g status-bg "${thm_bg}"
set -g status-justify "left"
set -g status-left-length "100"
set -g status-right-length "100"

# Messages
set -g message-style "fg=${thm_cyan},bg=${thm_gray},align=centre"
set -g message-command-style "fg=${thm_cyan},bg=${thm_gray},align=centre"

# Panes
set -g pane-border-style "fg=${thm_gray}"
set -g pane-active-border-style "fg=${thm_blue}"

# Windows
set -g window-status-activity-style "fg=${thm_fg},bg=${thm_bg},none"
set -g window-status-separator ""
set -g window-status-style "fg=${thm_fg},bg=${thm_bg},none"

# Statusline - current window
set -g window-status-current-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_magenta},bg=${thm_bg}](✓) #[fg=${thm_cyan},bg=${thm_bg}]#(echo '#{pane_current_path}' | rev | cut -d'/' -f-2 | rev) #[fg=${thm_magenta},bg=${thm_bg}]"

# Statusline - other windows
set -g window-status-format "#[fg=${thm_blue},bg=${thm_bg}] #I: #[fg=${thm_fg},bg=${thm_bg}]#W"

# Statusline - right side
set -g status-right "#[fg=${thm_blue},bg=${thm_bg},nobold,nounderscore,noitalics]#[fg=${thm_bg},bg=${thm_blue},nobold,nounderscore,noitalics] #[fg=${thm_fg},bg=${thm_gray}] #W #{?client_prefix,#[fg=${thm_magenta}],#[fg=${thm_cyan}]}#[bg=${thm_gray}]#{?client_prefix,#[bg=${thm_magenta}],#[bg=${thm_cyan}]}#[fg=${thm_bg}] #[fg=${thm_fg},bg=${thm_gray}] #S "

# Statusline - left side (empty)
set -g status-left ""

# Modes
set -g clock-mode-colour "${thm_blue}"
set -g mode-style "fg=${thm_blue} bg=${thm_black4} bold"
